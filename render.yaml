services:
  - type: web
    name: nbsis
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.10
      - key: DATABASE_NAME
        value: shell_security
      - key: FRONTEND_ORIGINS
        value: https://nbsis.vercel.app
      - key: MONGODB_URL
        sync: false
      - key: SECRET_KEY
        sync: false
